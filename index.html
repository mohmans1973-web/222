<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة فيديو تيك توك</title>
    <script async src="https://www.tiktok.com/embed.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }
        input, select, button {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
            font-size: 16px;
        }
        .videos {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 10px;
            margin-top: 20px;
        }
        .tiktok-embed {
            width: 100%;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>مشاهدة فيديو تيك توك</h2>
        <input type="text" id="videoUrl" placeholder="أدخل رابط فيديو تيك توك هنا">
        <select id="repeatCount">
            <!-- سيتم ملء القائمة تلقائيًا عبر JavaScript -->
        </select>
        <button onclick="generateVideos()">عرض الفيديو</button>
        
        <div class="videos" id="videoContainer"></div>
        <button id="playAllButton" style="margin-top: 20px;" onclick="playAllVideos()">تشغيل جميع الفيديوهات</button>
        <button id="stopAllButton" style="margin-top: 10px;" onclick="stopAllVideos()">إيقاف جميع الفيديوهات</button>
    </div>

    <script>
        // إنشاء خيارات القائمة المنسدلة من 1 إلى 25
        const select = document.getElementById("repeatCount");
        for (let i = 1; i <= 25; i++) {
            let option = document.createElement("option");
            option.value = i;
            option.textContent = i;
            select.appendChild(option);
        }

        function generateVideos() {
            const url = document.getElementById("videoUrl").value.trim();
            const count = parseInt(document.getElementById("repeatCount").value);
            const videoContainer = document.getElementById("videoContainer");

            // التحقق من صحة الرابط
            if (!url.includes("tiktok.com/")) {
                alert("يرجى إدخال رابط فيديو تيك توك صحيح.");
                return;
            }

            // استخراج معرف الفيديو من رابط تيك توك
            let videoIdMatch = url.match(/\/video\/(\d+)/);
            if (!videoIdMatch) {
                alert("تعذر استخراج معرف الفيديو. يرجى إدخال رابط صحيح.");
                return;
            }
            let videoId = videoIdMatch[1];

            // مسح المحتوى السابق
            videoContainer.innerHTML = "";

            // إنشاء الفيديوهات المتكررة
            for (let i = 0; i < count; i++) {
                let blockquote = document.createElement("blockquote");
                blockquote.className = "tiktok-embed";
                blockquote.setAttribute("cite", url);
                blockquote.setAttribute("data-video-id", videoId);
                blockquote.setAttribute("data-allowfullscreen", "true");
                blockquote.innerHTML = `
                    <section>
                        <a target="_blank" href="${url}">مشاهدة على تيك توك</a>
                    </section>
                `;
                videoContainer.appendChild(blockquote);
            }

            // إعادة تحميل سكربت تيك توك لتضمين الفيديوهات
            let script = document.createElement("script");
            script.src = "https://www.tiktok.com/embed.js";
            script.async = true;
            document.body.appendChild(script);
        }

        function playAllVideos() {
            const videos = document.querySelectorAll('.tiktok-embed');
            videos.forEach(video => {
                const videoId = video.getAttribute('data-video-id');
                const playUrl = `https://www.tiktok.com/embed/v${videoId}`;
                const iframe = document.createElement('iframe');
                iframe.src = playUrl;
                iframe.width = '100%';
                iframe.height = '400';
                iframe.style.border = 'none';
                video.appendChild(iframe);
            });
        }

        function stopAllVideos() {
            const videos = document.querySelectorAll('.tiktok-embed');
            videos.forEach(video => {
                // إزالة جميع iframes من الفيديو
                while (video.firstChild) {
                    video.removeChild(video.firstChild);
                }
            });
        }
    </script>

</body>
</html>
